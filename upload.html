<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 文件上传 - 叶哥工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 1.8em; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 16px;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .step {
            padding: 8px 16px;
            background: #e9ecef;
            color: #6c757d;
            border-radius: 20px;
            font-size: 12px;
            margin: 0 4px;
        }
        .step.active { background: #667eea; color: white; }
        .step.done { background: #28a745; color: white; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .form-group label span { color: #dc3545; }
        
        select, input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 文件上传区 */
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafbfc;
        }
        .upload-area:hover { border-color: #667eea; background: #f0f4ff; }
        .upload-area.dragover { border-color: #667eea; background: #e8f0ff; }
        .upload-area .icon { font-size: 48px; margin-bottom: 10px; }
        .upload-area .text { color: #666; }
        .upload-area .hint { color: #999; font-size: 12px; margin-top: 8px; }
        #fileInput { display: none; }
        
        /* 文件预览 */
        .file-preview {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-top: 16px;
        }
        .file-preview img {
            max-width: 120px;
            max-height: 120px;
            object-fit: contain;
            border-radius: 8px;
            margin-right: 16px;
        }
        .file-preview .info { flex: 1; }
        .file-preview .name { font-weight: 600; color: #333; word-break: break-all; }
        .file-preview .size { font-size: 12px; color: #999; margin-top: 4px; }
        .file-preview .remove {
            color: #dc3545;
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
        }
        
        /* 分析结果 */
        .analysis-result {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
        }
        .analysis-result h3 {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            color: #333;
        }
        .analysis-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .analysis-item:last-child { border-bottom: none; }
        .analysis-item .label { color: #666; }
        .analysis-item .value {
            font-weight: 600;
            color: #333;
            cursor: pointer;
        }
        .analysis-item .value:hover { color: #667eea; text-decoration: underline; }
        .analysis-item .editable {
            background: #fff;
            border: 1px solid #ddd;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        /* OCR原文 */
        .ocr-text {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
        }
        
        /* 按钮 */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover { background: #218838; }
        
        /* 进度/加载 */
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .text { color: #666; }
        
        /* 错误提示 */
        .error-message {
            padding: 12px;
            background: #fff3cd;
            border-radius: 8px;
            color: #856404;
            margin-bottom: 16px;
        }
        
        /* 成功提示 */
        .success-message {
            text-align: center;
            padding: 40px;
        }
        .success-message .icon { font-size: 64px; margin-bottom: 16px; }
        .success-message h3 { color: #28a745; margin-bottom: 8px; }
        .success-message p { color: #666; margin-bottom: 20px; }
        
        /* 页面切换 */
        .page { display: none; }
        .page.active { display: block; }
        
        /* 确认分析卡片 */
        .confirm-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .confirm-card h3 { margin-bottom: 12px; }
        .confirm-card .info { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 12px; }
        .confirm-card .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }
        .confirm-card .info-row .label { opacity: 0.9; }
        .confirm-card .info-row .value { font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📤 文件上传</h1>
            <p>AI智能识别 · 自动归类</p>
        </div>
        
        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <div class="step active" id="step1">1.上传</div>
            <div class="step" id="step2">2.分析</div>
            <div class="step" id="step3">3.确认</div>
        </div>
        
        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage" style="display:none;"></div>
        
        <!-- ========== 步骤1: 上传 ========== -->
        <div class="page active" id="pageUpload">
            <div class="card">
                <form id="uploadForm">
                    <!-- 项目选择 -->
                    <div class="form-group">
                        <label>选择项目 <span>*</span></label>
                        <select id="projectSelect" required>
                            <option value="">请选择项目...</option>
                            <option value="电梯维保">🏢 电梯维保</option>
                            <option value="消防维保">🚒 消防维保</option>
                            <option value="空调维保">❄️ 空调维保</option>
                            <option value="保安服务">👮 保安服务</option>
                            <option value="其他">📁 其他</option>
                        </select>
                    </div>
                    
                    <!-- 上传人 -->
                    <div class="form-group">
                        <label>上传人</label>
                        <input type="text" id="uploaderName" list="uploaderList" placeholder="选择或输入姓名" autocomplete="off">
                        <datalist id="uploaderList">
                            <option value="张三"><option value="李四"><option value="王五">
                            <option value="赵六"><option value="钱七"><option value="孙八">
                            <option value="周九"><option value="吴十">
                        </datalist>
                    </div>
                    
                    <!-- 文件上传区 -->
                    <div class="form-group">
                        <label>上传维保单照片 <span>*</span></label>
                        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                            <div class="icon">📷</div>
                            <div class="text">点击或拖拽上传</div>
                            <div class="hint">支持手机拍照、扫描件（PDF/图片）</div>
                        </div>
                        <input type="file" id="fileInput" accept="image/*,.pdf" onchange="handleFileSelect(this.files)">
                        
                        <!-- 文件预览 -->
                        <div class="file-preview" id="filePreview" style="display:none;">
                            <img id="previewImg" src="" alt="预览">
                            <div class="info">
                                <div class="name" id="fileName"></div>
                                <div class="size" id="fileSize"></div>
                            </div>
                            <span class="remove" onclick="removeFile()">×</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="analyzeBtn" disabled>
                        🔍 开始AI分析
                    </button>
                </form>
            </div>
        </div>
        
        <!-- ========== 步骤2: 分析中 ========== -->
        <div class="page" id="pageLoading">
            <div class="card">
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="text" id="loadingText">正在识别文字...</div>
                </div>
            </div>
        </div>
        
        <!-- ========== 步骤3: 确认分析结果 ========== -->
        <div class="page" id="pageConfirm">
            <div class="card">
                <!-- 确认信息 -->
                <div class="confirm-card">
                    <h3>📋 请确认分析结果</h3>
                    <div class="info">
                        <div class="info-row">
                            <span class="label">上传人</span>
                            <span class="value" id="confirmUploader">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">上传时间</span>
                            <span class="value" id="confirmTime">-</span>
                        </div>
                    </div>
                </div>
                
                <!-- 分析结果 -->
                <div class="analysis-result">
                    <h3>🤖 AI识别结果</h3>
                    
                    <div class="analysis-item">
                        <span class="label">识别到的合同/项目</span>
                        <span class="value" id="resultProject" onclick="editField('project')">-</span>
                    </div>
                    
                    <div class="analysis-item">
                        <span class="label">年度</span>
                        <span class="value" id="resultYear" onclick="editField('year')">-</span>
                    </div>
                    
                    <div class="analysis-item">
                        <span class="label">季度</span>
                        <span class="value" id="resultQuarter" onclick="editField('quarter')">-</span>
                    </div>
                    
                    <div class="analysis-item">
                        <span class="label">月份</span>
                        <span class="value" id="resultMonth" onclick="editField('month')">-</span>
                    </div>
                    
                    <div class="analysis-item">
                        <span class="label">检查日期</span>
                        <span class="value" id="resultDate" onclick="editField('date')">-</span>
                    </div>
                    
                    <!-- OCR原文 -->
                    <div class="ocr-text" id="ocrText" style="display:none;">
                        <strong>📝 OCR原文：</strong><br>
                        <span id="ocrContent"></span>
                    </div>
                </div>
                
                <!-- 按钮 -->
                <button class="btn btn-success" id="confirmBtn" onclick="confirmAndSave()">
                    ✅ 确认保存
                </button>
                <button class="btn btn-secondary" onclick="goStep(1)">
                    ← 重新上传
                </button>
            </div>
        </div>
        
        <!-- ========== 成功 ========== -->
        <div class="page" id="pageSuccess">
            <div class="card">
                <div class="success-message">
                    <div class="icon">✅</div>
                    <h3>保存成功！</h3>
                    <p id="successText">文件已自动归类到对应项目</p>
                    <button class="btn btn-primary" onclick="resetAll()">
                        继续上传
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            // API地址（云电脑OCR服务）
            API_BASE: 'http://115.190.127.72:8080',
            // 最大文件大小
            MAX_SIZE: 10 * 1024 * 1024,
            // 是否使用真实API
            USE_REAL_API: false,
        };

        // 状态
        let currentFile = null;
        let analysisResult = {};
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('uploadForm').addEventListener('submit', handleAnalyze);
            
            // 拖拽上传
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
            uploadArea.addEventListener('dragleave', e => { uploadArea.classList.remove('dragover'); });
            uploadArea.addEventListener('drop', e => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFileSelect(e.dataTransfer.files);
            });
        });

        // 文件选择
        function handleFileSelect(files) {
            if (files.length === 0) return;
            
            const file = files[0];
            if (file.size > CONFIG.MAX_SIZE) {
                showError('文件超过10MB限制');
                return;
            }
            
            currentFile = file;
            
            // 显示预览
            document.getElementById('filePreview').style.display = 'flex';
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            
            // 图片预览
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('previewImg').src = e.target.result;
                reader.readAsDataURL(file);
            } else {
                document.getElementById('previewImg').src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23f8f9fa" width="100" height="100"/><text x="50" y="50" font-size="40" text-anchor="middle" dy=".3em">📄</text></svg>';
            }
            
            // 更新按钮状态
            const project = document.getElementById('projectSelect').value;
            document.getElementById('analyzeBtn').disabled = !project;
        }

        // 移除文件
        function removeFile() {
            currentFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = true;
        }

        // 格式化大小
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 显示错误
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = '⚠️ ' + msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        // 切换步骤
        function goStep(step) {
            ['pageUpload', 'pageLoading', 'pageConfirm', 'pageSuccess'].forEach((id, i) => {
                document.getElementById(id).classList.remove('active');
            });
            
            ['step1', 'step2', 'step3'].forEach((id, i) => {
                document.getElementById(id).classList.remove('active', 'done');
            });
            
            const pages = ['pageUpload', 'pageLoading', 'pageConfirm', 'pageSuccess'];
            const steps = ['step1', 'step2', 'step3'];
            
            if (step <= 3) {
                document.getElementById(pages[step - 1]).classList.add('active');
            }
            
            for (let i = 0; i < step - 1; i++) {
                document.getElementById(steps[i]).classList.add('done');
            }
            document.getElementById(steps[step - 1]).classList.add('active');
        }

        // 处理分析请求
        async function handleAnalyze(e) {
            e.preventDefault();
            
            if (!currentFile) {
                showError('请先选择文件');
                return;
            }
            
            const project = document.getElementById('projectSelect').value;
            const uploader = document.getElementById('uploaderName').value.trim() || '匿名';
            
            // 切换到加载页面
            goStep(2);
            
            // 模拟OCR分析
            try {
                // 实际应该调用云端API
                // const formData = new FormData();
                // formData.append('file', currentFile);
                // formData.append('project', project);
                // const response = await fetch(CONFIG.API_BASE + '/api/ocr', { method: 'POST', body: formData });
                // analysisResult = await response.json();
                
                // 模拟分析（实际实现时删除这段）
                await simulateOCR();
                
                // 显示分析结果
                showAnalysisResult(project, uploader);
                goStep(3);
                
            } catch (err) {
                showError('分析失败: ' + err.message);
                goStep(1);
            }
        }

        // 模拟OCR（可替换为真实API调用）
        async function simulateOCR() {
            if (CONFIG.USE_REAL_API && currentFile) {
                // 真实API调用
                const formData = new FormData();
                formData.append('file', currentFile);
                formData.append('project', document.getElementById('projectSelect').value);
                formData.append('uploader', document.getElementById('uploaderName').value || '匿名');
                
                try {
                    const response = await fetch(CONFIG.API_BASE + '/api/upload-analyze', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (data.success) {
                        analysisResult = {
                            project: data.analysis.project || document.getElementById('projectSelect').value,
                            year: data.analysis.year || new Date().getFullYear().toString(),
                            quarter: data.analysis.quarter || '',
                            month: data.analysis.month || '',
                            date: data.analysis.date || new Date().toISOString().split('T')[0],
                            ocrText: data.analysis.ocr_text || ''
                        };
                        return;
                    }
                } catch (err) {
                    console.error('API调用失败:', err);
                }
            }
            
            // 模拟分析
            const steps = [
                '正在上传文件...',
                '正在识别文字...',
                '正在分析合同信息...',
                '正在识别日期...',
                '分析完成！'
            ];
            
            for (let i = 0; i < steps.length; i++) {
                document.getElementById('loadingText').textContent = steps[i];
                await new Promise(r => setTimeout(r, 400));
            }
            
            // 生成模拟分析结果
            const now = new Date();
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const month = now.getMonth() + 1;
            const quarter = Math.ceil(month / 3);
            const project = document.getElementById('projectSelect').value;
            
            analysisResult = {
                project: project || '其他',
                year: now.getFullYear().toString(),
                quarter: 'Q' + quarter,
                month: months[month - 1],
                date: now.toISOString().split('T')[0],
                ocrText: '电梯日常维护保养记录\n设备编号: DT-2026-001\n维保单位: 某某电梯公司\n维保人员: 张三\n日期: ' + now.toLocaleDateString() + '\n设备状态: 正常'
            };
        }

        // 显示分析结果
        function showAnalysisResult(project, uploader) {
            document.getElementById('confirmUploader').textContent = uploader;
            document.getElementById('confirmTime').textContent = new Date().toLocaleString();
            
            document.getElementById('resultProject').textContent = analysisResult.project || '-';
            document.getElementById('resultYear').textContent = analysisResult.year || '-';
            document.getElementById('resultQuarter').textContent = analysisResult.quarter || '-';
            document.getElementById('resultMonth').textContent = analysisResult.month || '-';
            document.getElementById('resultDate').textContent = analysisResult.date || '-';
            
            if (analysisResult.ocrText) {
                document.getElementById('ocrText').style.display = 'block';
                document.getElementById('ocrContent').textContent = analysisResult.ocrText;
            }
        }

        // 编辑字段
        function editField(field) {
            const currentValue = analysisResult[field] || '';
            const input = prompt('请输入新的值:', currentValue);
            
            if (input !== null) {
                analysisResult[field] = input;
                
                const fieldMap = {
                    'project': 'resultProject',
                    'year': 'resultYear',
                    'quarter': 'resultQuarter',
                    'month': 'resultMonth',
                    'date': 'resultDate'
                };
                
                if (fieldMap[field]) {
                    document.getElementById(fieldMap[field]).textContent = input || '-';
                }
            }
        }

        // 确认并保存
        async function confirmAndSave() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';
            
            try {
                if (CONFIG.USE_REAL_API) {
                    // 真实API调用
                    const formData = new FormData();
                    formData.append('file_id', 'demo_' + Date.now());
                    formData.append('file_name', currentFile.name);
                    formData.append('file_path', '/uploads/' + analysisResult.project + '/' + currentFile.name);
                    formData.append('file_size', currentFile.size);
                    formData.append('analysis_json', JSON.stringify(analysisResult));
                    formData.append('uploader', document.getElementById('uploaderName').value || '匿名');
                    
                    await fetch(CONFIG.API_BASE + '/api/confirm-save', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    // 模拟保存
                    await new Promise(r => setTimeout(r, 800));
                }
                
                // 显示成功
                document.getElementById('successText').textContent = 
                    `${currentFile.name} 已保存到「${analysisResult.project}」项目`;
                goStep(4);
                
            } catch (err) {
                showError('保存失败: ' + err.message);
                btn.disabled = false;
                btn.textContent = '✅ 确认保存';
            }
        }

        // 重置
        function resetAll() {
            currentFile = null;
            analysisResult = {};
            
            document.getElementById('uploadForm').reset();
            removeFile();
            goStep(1);
        }
    </script>
</body>
</html>
